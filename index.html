<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Foto → PDF Laporan Instalasi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- CSS sama seperti sebelumnya -->
<style>
  :root { --navy-950:#0a1326; --paper:#f3f5f9; --card:#ffffff; --line:#e4e8f1; }
  body{ font-family:sans-serif; background:var(--paper); padding:20px; }
  .grid-container { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .field { margin-bottom: 12px; }
  .field label{ display:block; font-size:11px; font-weight:700; color:#555; text-transform:uppercase; }
  .field input{ width:100%; padding:10px; border:1px solid var(--line); border-radius:8px; }
  .btn{ padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight:600; width:100%; }
  .btn-primary{ background:var(--navy-950); color:#fff; }
  .photo-group-box { background: var(--card); border: 1px solid var(--line); padding: 12px; margin-bottom: 10px; border-radius: 8px; }
</style>
</head>
<body>

<div class="grid-container">
  <div>
    <div style="background:white; padding:20px; border-radius:12px; border:1px solid #ddd;">
      <div class="field"><label>Nama Customer</label><input type="text" id="custName"></div>
      <div class="field"><label>Nama Kegiatan</label><input type="text" id="activityName"></div>
      <div class="field"><label>Alamat</label><input type="text" id="custAddress"></div>
      <div class="field"><label>Tanggal</label><input type="date" id="installDate"></div>
      <div class="field"><label>Teknisi</label><input type="text" id="techName"></div>
    </div>
    <div style="margin-top:20px; background:white; padding:20px; border-radius:12px; border:1px solid #ddd;">
      <div class="field"><label>Subjudul Kelompok Foto</label><input type="text" id="currentSubtitleInput"></div>
      <input type="file" id="fileInput" multiple accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
      <button class="btn" onclick="triggerUpload()">📸 Tambah Gambar</button>
    </div>
  </div>

  <div>
    <div id="photoPreviewContainer" style="background:white; border:1px solid #ddd; padding:15px; border-radius:12px; min-height:300px;"></div>
    <button class="btn btn-primary" style="margin-top:15px;" onclick="simpanKeSupabase()">💾 Simpan & Download PDF</button>
  </div>
</div>

<script>
  const supabase = supabase.createClient('https://thcnsestuujsfarqaxso.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoY25zZXN0dXVqc2ZhcnFheHNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NjgyNDEsImV4cCI6MjA5ODM0NDI0MX0.kpjFTpzFuDanzHUjRrqnNuoisL8fcsD1WfjOX3eRwZY');
  let structuredGroups = [];

  // Fungsi simpan yang sudah disesuaikan namanya
  async function simpanKeSupabase() {
    const payload = {
      nama_customer: document.getElementById('custName').value, // Harus sama dengan nama kolom di Supabase
      kegiatan: document.getElementById('activityName').value,  // Harus sama dengan nama kolom di Supabase
      alamat: document.getElementById('custAddress').value,
      tanggal: document.getElementById('installDate').value,
      teknisi: document.getElementById('techName').value
    };

    const { error } = await supabase.from('laporan_instalasi').insert([payload]);
    if (error) {
      alert("Gagal: " + error.message);
    } else {
      alert("Berhasil!");
    }
  }

  // Fungsi pendukung lainnya (handleFileSelect, renderPreviews, dll sama seperti sebelumnya)
  function triggerUpload() { 
      if(!document.getElementById('currentSubtitleInput').value) return alert("Isi subjudul!");
      document.getElementById('fileInput').click(); 
  }
  // ... Tambahkan fungsi handleFileSelect dan renderPreviews Anda di sini
</script>
