<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Laporan Instalasi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f3f5f9; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .photo-group-box { background: #f9f9f9; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="grid-container">
    <div>
        <div class="card">
            <input type="text" id="custName" placeholder="Nama Customer">
            <input type="text" id="activityName" placeholder="Nama Kegiatan">
            <input type="text" id="custAddress" placeholder="Alamat">
            <input type="date" id="installDate">
            <input type="text" id="techName" placeholder="Teknisi">
        </div>
        <div class="card">
            <input type="text" id="currentSubtitleInput" placeholder="Subjudul Kelompok Foto">
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
            <button style="background: #e4e8f1;" onclick="triggerUpload()">📸 Pilih & Tambah Gambar</button>
        </div>
    </div>
    <div>
        <div id="photoPreviewContainer" class="card" style="min-height: 300px;"></div>
        <button id="mainBtn" style="background: #0a1326; color: white;" onclick="prosesSelesai()">💾 Simpan ke Cloud & Download PDF</button>
    </div>
</div>

<script>
    const sb = supabase.createClient(
        'https://bcmkbdvtrfpovjwnquzw.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjbWtiZHZ0cmZwb3Zqd25xdXp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MjI2MjgsImV4cCI6MjA5ODI5ODYyOH0.zztNPO5Yr5gOj-TqeyhBqWA9-0CFVPP5iML5WqNv7fQ'
    );
    
    let structuredGroups = [];

    function sanitizePath(str) {
        return str.toString().replace(/[^a-z0-9]/gi, '_').toLowerCase();
    }

    function triggerUpload() {
        const sub = document.getElementById('currentSubtitleInput').value.trim();
        if (!sub) return alert("Isi subjudul dulu untuk menambahkan foto!");
        document.getElementById('fileInput').click();
    }

    // Menangani penambahan foto (bisa ke subjudul baru atau menambah ke yang sudah ada)
    function handleFileSelect(event) {
        const subtitle = document.getElementById('currentSubtitleInput').value.trim();
        if (!subtitle) return;
        
        let group = structuredGroups.find(g => g.subtitle === subtitle);
        if (!group) { 
            group = { subtitle, images: [] }; 
            structuredGroups.push(group); 
        }

        Array.from(event.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                group.images.push({ base64: e.target.result });
                renderPreviews();
            };
            reader.readAsDataURL(file);
        });
        event.target.value = '';
    }

    function renderPreviews() {
        const container = document.getElementById('photoPreviewContainer');
        container.innerHTML = '';
        structuredGroups.forEach((group) => {
            const box = document.createElement('div');
            box.className = 'photo-group-box';
            box.innerHTML = `<strong>${group.subtitle}</strong> (${group.images.length} foto)<br>`;
            group.images.forEach(img => {
                box.innerHTML += `<img src="${img.base64}" style="width:50px; height:50px; object-fit:cover; margin:2px;">`;
            });
            container.appendChild(box);
        });
    }

    async function prosesSelesai() {
        if (structuredGroups.length === 0) return alert("Belum ada foto!");
        
        const btn = document.getElementById('mainBtn');
        btn.disabled = true;
        btn.innerText = "Sedang Memproses & Mengupload...";

        try {
            const pdfData = generatePDFBlob();
            const custName = document.getElementById('custName').value.trim() || "Laporan_Instalasi";
            const fileName = `${sanitizePath(custName)}_${Date.now()}.pdf`;

            const { error } = await sb.storage
                .from('laporan_foto')
                .upload(fileName, pdfData, { contentType: 'application/pdf' });

            if (error) throw error;

            alert("Berhasil! Laporan telah disimpan di cloud.");
        } catch (err) {
            console.error(err);
            alert("Gagal: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "💾 Simpan ke Cloud & Download PDF";
        }
    }

    function generatePDFBlob() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        structuredGroups.forEach((group, index) => {
            if (index > 0) doc.addPage();
            
            doc.setFontSize(16);
            doc.text(group.subtitle, 14, 20);
            
            let x = 14; 
            let y = 30;
            const imgWidth = 85; 
            const imgHeight = 60;
            
            group.images.forEach((img, i) => {
                if (i > 0 && i % 2 === 0) {
                    x = 14;
                    y += (imgHeight + 10);
                } else if (i > 0) {
                    x = 14 + imgWidth + 5;
                }
                
                if (y + imgHeight > 280) {
                    doc.addPage();
                    y = 20;
                    x = 14;
                }

                doc.addImage(img.base64, 'JPEG', x, y, imgWidth, imgHeight);
            });
        });
        return doc.output('blob');
    }
</script>
</body>
</html>
