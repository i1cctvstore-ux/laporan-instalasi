<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foto → PDF Laporan Instalasi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy-950:#0a1326; --navy-800:#142544; --navy-700:#1c3157;
    --blue-500:#2f6fed; --paper:#f3f5f9; --card:#ffffff;
    --line:#e4e8f1; --muted:#6e7790; --muted-2:#9aa2b8; --radius-lg:16px;
  }
  *{box-sizing:border-box;}
  body{ font-family:'Montserrat',sans-serif; background:var(--paper); color:#101a30; margin:0; padding:20px; font-size:14px; }
  .topbar{ background:var(--card); border-bottom:1px solid var(--line); padding:16px 28px; margin-bottom:20px; border-radius:8px; }
  .grid-container { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .field { margin-bottom: 12px; }
  .field label{ display:block; font-size:11px; font-weight:700; color:var(--navy-700); margin-bottom:6px; text-transform:uppercase; }
  .field input{ width:100%; padding:10px 12px; border:1.4px solid var(--line); border-radius:8px; }
  .btn{ border:none; border-radius:8px; padding:12px; font-weight:600; cursor:pointer; width:100%; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-primary{ background:var(--navy-950); color:#fff; }
  .photo-group-box { background: var(--card); border-radius: 9px; padding: 12px; margin-bottom: 12px; border: 1px solid var(--line); }
  @media (max-width: 768px) { .grid-container { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="topbar">
  <h1>Foto → PDF Laporan Instalasi</h1>
</div>

<div class="grid-container">
  <div>
    <div style="background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px;">
      <div class="field"><label>Customer</label><input type="text" id="pdfTitle"></div>
      <div class="field"><label>Alamat</label><input type="text" id="custAddress"></div>
      <div class="field"><label>Tanggal</label><input type="date" id="installDate"></div>
      <div class="field"><label>Teknisi</label><input type="text" id="techName"></div>
    </div>
    <div style="margin-top:20px; background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px;">
      <div class="field"><label>Subjudul Kelompok Foto</label><input type="text" id="currentSubtitleInput"></div>
      <input type="file" id="fileInput" multiple accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
      <button class="btn" style="background:#e4e8f1; color:var(--navy-950);" onclick="triggerUpload()">📸 Pilih & Tambah Gambar</button>
    </div>
  </div>

  <div>
    <div id="photoPreviewContainer" style="background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:14px;min-height:300px;">
      <div id="emptyState" style="text-align:center; padding:60px 0; color:var(--muted-2);">Belum ada data foto.</div>
    </div>
    <button class="btn btn-primary" style="margin-top:15px;" onclick="simpanKeSupabase()">💾 Simpan & Download PDF</button>
  </div>
</div>

<script>
  const supabaseClient = supabase.createClient('https://thcnsestuujsfarqaxso.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoY25zZXN0dXVqc2ZhcnFheHNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NjgyNDEsImV4cCI6MjA5ODM0NDI0MX0.kpjFTpzFuDanzHUjRrqnNuoisL8fcsD1WfjOX3eRwZY');
  let structuredGroups = [];
  const { jsPDF } = window.jspdf;

  function triggerUpload() {
    if (!document.getElementById('currentSubtitleInput').value.trim()) return alert("Isi subjudul dulu!");
    document.getElementById('fileInput').click();
  }

  // Fungsi tambahan untuk tombol "+ Tambah" di setiap grup
  function tambahFotoKeGrup(subtitle) {
    document.getElementById('currentSubtitleInput').value = subtitle;
    document.getElementById('fileInput').click();
  }

  function handleFileSelect(event) {
    const files = event.target.files;
    const subtitle = document.getElementById('currentSubtitleInput').value.trim();
    let group = structuredGroups.find(g => g.subtitle.toLowerCase() === subtitle.toLowerCase());
    if (!group) { group = { subtitle, images: [] }; structuredGroups.push(group); }

    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = 800; canvas.height = (img.height * 800) / img.width;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          group.images.push({ base64: canvas.toDataURL('image/jpeg', 0.7) });
          renderPreviews();
        };
      };
      reader.readAsDataURL(file);
    });
  }

  function renderPreviews() {
    const container = document.getElementById('photoPreviewContainer');
    container.innerHTML = '';
    structuredGroups.forEach((group, gIdx) => {
      const box = document.createElement('div');
      box.className = 'photo-group-box';
      box.innerHTML = `
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
            <strong>${group.subtitle}</strong>
            <span onclick="tambahFotoKeGrup('${group.subtitle}')" style="cursor:pointer; font-size:10px; background:#e4e8f1; padding:2px 6px; border-radius:4px;">+ Tambah</span>
        </div>`;
      const grid = document.createElement('div');
      grid.style.display = 'grid'; grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(70px, 1fr))'; grid.style.gap = '5px';
      group.images.forEach((img, iIdx) => {
        grid.innerHTML += `<div style="position:relative"><img src="${img.base64}" style="width:100%; height:60px; object-fit:cover; border-radius:4px;">
        <span onclick="removeImage(${gIdx}, ${iIdx})" style="position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; width:15px; height:15px; font-size:10px; text-align:center; cursor:pointer;">×</span></div>`;
      });
      box.appendChild(grid);
      container.appendChild(box);
    });
  }

  function removeImage(gIdx, iIdx) {
    structuredGroups[gIdx].images.splice(iIdx, 1);
    if (!structuredGroups[gIdx].images.length) structuredGroups.splice(gIdx, 1);
    renderPreviews();
  }

  function generatePDF() {
    const doc = new jsPDF();
    doc.text(document.getElementById('pdfTitle').value || "Laporan", 14, 20);
    let y = 30;
    structuredGroups.forEach(group => {
      doc.text(group.subtitle, 14, y); y += 10;
      group.images.forEach((img, i) => {
        if (y > 250) { doc.addPage(); y = 20; }
        const x = (i % 2 === 0) ? 14 : 110;
        doc.addImage(img.base64, 'JPEG', x, y, 85, 60);
        if (i % 2 !== 0) y += 70;
      });
      y += 80;
    });
    doc.save("Laporan.pdf");
  }

  async function simpanKeSupabase() {
    const { error } = await supabaseClient.from('laporan_instalasi').insert([{
      tanggal: document.getElementById('installDate').value,
      name_kegiatan: document.getElementById('pdfTitle').value,
      alamat: document.getElementById('custAddress').value,
      teknisi: document.getElementById('techName').value
    }]);
    if (error) alert("Gagal: " + error.message);
    else { alert("Berhasil!"); generatePDF(); }
  }
</script>
</body>
</html>
