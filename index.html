<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Laporan Instalasi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f3f5f9; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .photo-group-box { background: white; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="grid-container">
    <div>
        <div class="card">
            <input type="text" id="custName" placeholder="Nama Customer">
            <input type="text" id="activityName" placeholder="Nama Kegiatan">
            <input type="text" id="custAddress" placeholder="Alamat">
            <input type="date" id="installDate">
            <input type="text" id="techName" placeholder="Teknisi">
        </div>
        <div class="card">
            <input type="text" id="currentSubtitleInput" placeholder="Subjudul Kelompok Foto">
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
            <button style="background: #e4e8f1;" onclick="triggerUpload()">📸 Pilih & Tambah Gambar</button>
        </div>
    </div>
    <div>
        <div id="photoPreviewContainer" class="card" style="min-height: 300px;"></div>
        <button style="background: #0a1326; color: white;" onclick="simpanKeSupabase()">💾 Simpan & Download PDF</button>
    </div>
</div>

<script>
    const supabase = supabase.createClient('URL_SUPABASE_ANDA', 'KEY_SUPABASE_ANDA');
    let structuredGroups = [];
    const { jsPDF } = window.jspdf;

    function triggerUpload() {
        if (!document.getElementById('currentSubtitleInput').value.trim()) return alert("Isi subjudul dulu!");
        document.getElementById('fileInput').click();
    }

    function handleFileSelect(event) {
        const subtitle = document.getElementById('currentSubtitleInput').value.trim();
        let group = structuredGroups.find(g => g.subtitle.toLowerCase() === subtitle.toLowerCase());
        if (!group) { group = { subtitle, images: [] }; structuredGroups.push(group); }

        Array.from(event.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                group.images.push({ base64: e.target.result });
                renderPreviews();
            };
            reader.readAsDataURL(file);
        });
    }

    function renderPreviews() {
        const container = document.getElementById('photoPreviewContainer');
        container.innerHTML = '';
        structuredGroups.forEach((group, gIdx) => {
            const box = document.createElement('div');
            box.className = 'photo-group-box';
            box.innerHTML = `<strong>${group.subtitle}</strong> <button onclick="tambahFotoKeGrup('${group.subtitle}')" style="font-size:10px; width:auto;">+ TAMBAH</button>`;
            group.images.forEach(img => {
                box.innerHTML += `<img src="${img.base64}" style="width:50px; height:50px; object-fit:cover; margin:2px;">`;
            });
            container.appendChild(box);
        });
    }

    function tambahFotoKeGrup(subtitle) {
        document.getElementById('currentSubtitleInput').value = subtitle;
        document.getElementById('fileInput').click();
    }

    async function simpanKeSupabase() {
        try {
            let fotoUrls = [];
            // Upload foto ke Storage
            for (let group of structuredGroups) {
                for (let imgObj of group.images) {
                    const fileName = `foto_${Date.now()}_${Math.random()}.jpg`;
                    const blob = await (await fetch(imgObj.base64)).blob();
                    const { error: upErr } = await supabase.storage.from('laporan-foto').upload(fileName, blob);
                    if (upErr) throw upErr;
                    const { data: urlData } = supabase.storage.from('laporan-foto').getPublicUrl(fileName);
                    fotoUrls.push(urlData.publicUrl);
                }
            }

            // Simpan ke Database
            const { error: dbErr } = await supabase.from('laporan_instalasi').insert([{
                nama_customer: document.getElementById('custName').value,
                kegiatan: document.getElementById('activityName').value,
                alamat: document.getElementById('custAddress').value,
                tanggal: document.getElementById('installDate').value,
                teknisi: document.getElementById('techName').value,
                foto_urls: fotoUrls
            }]);
            
            if (dbErr) throw dbErr;
            alert("Berhasil disimpan ke Cloud!");
            generatePDF();
        } catch (err) {
            alert("Error: " + err.message);
        }
    }

    function generatePDF() {
        const doc = new jsPDF();
        doc.text("Laporan: " + document.getElementById('activityName').value, 14, 20);
        let y = 30;
        structuredGroups.forEach(group => {
            doc.text(group.subtitle, 14, y); y += 10;
            group.images.forEach(img => {
                doc.addImage(img.base64, 'JPEG', 14, y, 80, 60);
                y += 70;
            });
        });
        doc.save("Laporan.pdf");
    }
</script>
</body>
</html>
