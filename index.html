<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foto → PDF Laporan Instalasi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy-950:#0a1326; --navy-800:#142544; --navy-700:#1c3157;
    --blue-500:#2f6fed; --paper:#f3f5f9; --card:#ffffff;
    --line:#e4e8f1; --line-soft:#edf0f6; --muted:#6e7790;
    --muted-2:#9aa2b8; --radius-lg:16px; --radius-sm:8px;
    --font:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;}
  body{ font-family:var(--font); background:var(--paper); color:#101a30; margin:0; padding:20px; font-size:14px; }
  button{font-family:inherit;cursor:pointer;}
  .topbar{ background:var(--card); border-bottom:1px solid var(--line); padding:16px 28px; margin-bottom:20px; border-radius:var(--radius-sm); }
  .topbar h1{ font-size:18px; margin:0; letter-spacing:-.2px; }
  .topbar .crumbs{ font-size:12px; color:var(--muted); margin-top:2px; }
  .view-inner { padding: 10px 0; }
  .grid-container { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .field { margin-bottom: 0; }
  .field label{ display:block; font-size:11.5px; font-weight:700; color:var(--navy-700); margin-bottom:6px; text-transform:uppercase; letter-spacing:.3px; }
  .field input{ width:100%; padding:10px 12px; border:1.4px solid var(--line); border-radius:var(--radius-sm); font-size:13.5px; background:#fafbfd; outline:none; }
  .field input:focus{ border-color:var(--blue-500); background:#fff; }
  .btn{ border:none; border-radius:var(--radius-sm); padding:9px 15px; font-size:13px; font-weight:600; display:inline-flex; align-items:center; gap:7px; }
  .btn-primary{ background:var(--navy-950); color:#fff; }
  .btn-primary:hover{ background:var(--navy-800); }
  .photo-group-box { background: var(--card); border-radius: 9px; padding: 12px; margin-bottom: 12px; border: 1px solid var(--line); }
  .subtitle-badge { display: inline-block; background: #dde3f0; color: var(--navy-950); padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; margin-top: 5px; }
  .subtitle-badge:hover { background: var(--blue-500); color: #fff; }
  @media (max-width: 768px) { .grid-container { grid-template-columns: 1fr; } body { padding: 10px; } .topbar { padding: 14px; } }
</style>
</head>
<body>

  <div class="view" id="view-pdf-instalasi">
    <div class="topbar">
      <div>
        <h1>Foto → PDF Laporan Instalasi</h1>
        <div class="crumbs">Gabungkan foto hasil instalasi menjadi PDF terstruktur berjejer kiri dan kanan</div>
      </div>
    </div>
    
    <div class="view-inner">
      <div class="grid-container">
        <div style="display:flex;flex-direction:column;gap:16px;">
          <div>
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:12px;">1. Info Lengkap Laporan</div>
            <div style="background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;gap:12px;">
              <div class="field"><label>Kegiatan / Nama Customer</label><input type="text" id="pdfTitle" placeholder="mis. Laporan Instalasi - Toko Budi Jaya"></div>
              <div class="field"><label>Lokasi / Alamat</label><input type="text" id="custAddress" placeholder="mis. Jl. Mawar No.12"></div>
              <div class="field"><label>Tanggal Instalasi</label><input type="date" id="installDate"></div>
              <div class="field"><label>Teknisi</label><input type="text" id="techName" placeholder="mis. Budi Santoso"></div>
            </div>
          </div>

          <div>
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:12px;">2. Alur Tambah Foto per Subjudul</div>
            <div style="background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;gap:14px;">
              <div class="field">
                <label>Tulis Subjudul Kelompok Foto Ini</label>
                <input type="text" id="currentSubtitleInput" placeholder="mis. Sebelum / Sesudah">
                <div id="quickSelectContainer" style="margin-top: 8px; display: none;">
                  <span style="font-size: 11px; color: var(--muted); display: block;">Pilih Cepat:</span>
                  <div id="badgeList" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;"></div>
                </div>
              </div>
              <input type="file" id="fileInput" multiple accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
              <div style="background:#fafbfd;border:2px dashed var(--line);border-radius:var(--radius-sm);padding:24px 15px;text-align:center;cursor:pointer;" onclick="triggerUploadWithSubtitleCheck()">
                <div style="font-size:24px;margin-bottom:6px;">📸</div>
                <div style="font-weight:600;font-size:13px;margin-bottom:2px;">Klik untuk Pilih Foto</div>
              </div>
            </div>
          </div>
        </div>

        <div>
          <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:12px;">3. Preview</div>
          <div id="photoPreviewContainer" style="background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px;display:flex;flex-direction:column;min-height:180px;">
            <div id="emptyState" style="font-size:12.5px;color:var(--muted-2);text-align:center;padding:40px 0;">Belum ada data foto.</div>
          </div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="simpanKeSupabase()">💾 Simpan & Generate PDF</button>
        </div>
      </div>
    </div>
  </div>

<script>
  let structuredGroups = [];
  const supabaseClient = supabase.createClient('https://thcnsestuujsfarqaxso.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoY25zZXN0dXVqc2ZhcnFheHNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NjgyNDEsImV4cCI6MjA5ODM0NDI0MX0.kpjFTpzFuDanzHUjRrqnNuoisL8fcsD1WfjOX3eRwZY');
  const { jsPDF } = window.jspdf;

  function triggerUploadWithSubtitleCheck() {
    const s = document.getElementById('currentSubtitleInput').value.trim();
    if (!s) return alert("Isi subjudul dulu!");
    document.getElementById('fileInput').click();
  }

  function handleFileSelect(event) {
    const files = event.target.files;
    const subtitle = document.getElementById('currentSubtitleInput').value.trim();
    document.getElementById('emptyState').style.display = 'none';
    let group = structuredGroups.find(g => g.subtitle.toLowerCase() === subtitle.toLowerCase());
    if (!group) { group = { subtitle, images: [] }; structuredGroups.push(group); }

    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = 1000; canvas.height = (img.height * 1000) / img.width;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          group.images.push({ name: file.name, base64: canvas.toDataURL('image/jpeg', 0.75), aspect: img.width / img.height });
          renderPreviews(); updateBadges();
        };
      };
      reader.readAsDataURL(file);
    });
  }

  function updateBadges() {
    const list = document.getElementById('badgeList');
    list.innerHTML = '';
    structuredGroups.forEach(g => {
      const s = document.createElement('span');
      s.className = 'subtitle-badge';
      s.textContent = g.subtitle;
      s.onclick = () => document.getElementById('currentSubtitleInput').value = g.subtitle;
      list.appendChild(s);
    });
    document.getElementById('quickSelectContainer').style.display = structuredGroups.length ? 'block' : 'none';
  }

  function renderPreviews() {
    const container = document.getElementById('photoPreviewContainer');
    container.innerHTML = '';
    structuredGroups.forEach((group, gIdx) => {
      const box = document.createElement('div');
      box.className = 'photo-group-box';
      box.innerHTML = `<strong>${group.subtitle}</strong>`;
      group.images.forEach((img, iIdx) => {
        box.innerHTML += `<div style="font-size:11px;">${img.name} <span onclick="removeImage(${gIdx}, ${iIdx})" style="cursor:pointer; color:red;">[X]</span></div>`;
      });
      container.appendChild(box);
    });
  }

  function removeImage(gIdx, iIdx) {
    structuredGroups[gIdx].images.splice(iIdx, 1);
    if (!structuredGroups[gIdx].images.length) structuredGroups.splice(gIdx, 1);
    renderPreviews(); updateBadges();
  }

  function generatePDF() {
    if (!structuredGroups.length) return alert("Belum ada foto!");
    const doc = new jsPDF();
    doc.text(document.getElementById('pdfTitle').value || "Laporan", 14, 20);
    let y = 30;
    structuredGroups.forEach(group => {
      if (y > 270) { doc.addPage(); y = 20; }
      doc.text(`- ${group.subtitle}`, 14, y); y += 10;
      group.images.forEach((img, i) => {
        if (y + 65 > 280) { doc.addPage(); y = 20; }
        const x = (i % 2 === 0) ? 14 : 108;
        doc.addImage(img.base64, 'JPEG', x, y, 86, 65);
        doc.rect(x, y, 86, 65);
        if (i % 2 !== 0) y += 75;
      });
      y += 20;
    });
    doc.save("Laporan.pdf");
  }

  async function simpanKeSupabase() {
    const { error } = await supabaseClient.from('laporan_instalasi').insert([{
      tanggal: document.getElementById('installDate').value,
      name_kegiatan: document.getElementById('pdfTitle').value,
      alamat: document.getElementById('custAddress').value,
      teknisi: document.getElementById('techName').value
    }]);
    if (error) alert("Gagal: " + error.message);
    else { alert("Berhasil!"); generatePDF(); }
  }
</script>
</body>
</html>
