<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foto → PDF Laporan Instalasi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root {
        --navy-950:#0a1326; --navy-800:#142544; --navy-700:#1c3157;
        --blue-500:#2f6fed; --paper:#f3f5f9; --card:#ffffff;
        --line:#e4e8f1; --muted:#6e7790; --radius-lg:16px; --radius-sm:8px;
    }
    body{ font-family:sans-serif; background:var(--paper); padding:20px; font-size:14px; }
    .grid-container { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .field { margin-bottom: 12px; }
    .field label{ display:block; font-size:11px; font-weight:700; color:var(--navy-700); margin-bottom:4px; text-transform:uppercase; }
    .field input{ width:100%; padding:10px; border:1px solid var(--line); border-radius:var(--radius-sm); outline:none; }
    .btn{ border:none; border-radius:var(--radius-sm); padding:10px 15px; cursor:pointer; font-weight:600; margin-top:5px; }
    .btn-primary{ background:var(--navy-950); color:#fff; width:100%; }
    .photo-group-box { background: var(--card); border-radius: 9px; padding: 12px; margin-bottom: 12px; border: 1px solid var(--line); }
    .subtitle-badge { display: inline-block; background: #dde3f0; color: var(--navy-950); padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; margin: 2px; }
    .subtitle-badge:hover { background: var(--blue-500); color: #fff; }
    @media (max-width: 768px) { .grid-container { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="topbar"><h1>Foto → PDF Laporan Instalasi</h1></div>

<div class="grid-container">
    <div>
        <div class="field"><label>Kegiatan / Customer</label><input type="text" id="pdfTitle"></div>
        <div class="field"><label>Alamat</label><input type="text" id="custAddress"></div>
        <div class="field"><label>Teknisi</label><input type="text" id="techName"></div>
        <div class="field">
            <label>Subjudul (Pilih atau Ketik Baru)</label>
            <input type="text" id="currentSubtitleInput" placeholder="mis. Sebelum Instalasi">
            <div id="quickSelectContainer" style="display: none; margin-top: 8px;">
                <span style="font-size: 11px; color: var(--muted);">Pilih Cepat:</span>
                <div id="badgeList"></div>
            </div>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
        <div style="background:#fafbfd;border:2px dashed var(--line);padding:20px;text-align:center;cursor:pointer;" onclick="triggerUploadWithSubtitleCheck()">
            📸 Klik untuk Pilih Foto
        </div>
    </div>

    <div>
        <h3>Preview</h3>
        <div id="photoPreviewContainer"><div id="emptyState" style="color:var(--muted); text-align:center; padding:20px;">Belum ada foto.</div></div>
        <button class="btn btn-primary" onclick="simpanKeSupabase()">Simpan & Download PDF</button>
    </div>
</div>

<script>
    let structuredGroups = [];
    const supabaseClient = supabase.createClient('https://thcnsestuujsfarqaxso.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRoY25zZXN0dXVqc2ZhcnFheHNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NjgyNDEsImV4cCI6MjA5ODM0NDI0MX0.kpjFTpzFuDanzHUjRrqnNuoisL8fcsD1WfjOX3eRwZY');
    const { jsPDF } = window.jspdf;

    function triggerUploadWithSubtitleCheck() {
        if (!document.getElementById('currentSubtitleInput').value.trim()) return alert("Isi subjudul dulu!");
        document.getElementById('fileInput').click();
    }

    function handleFileSelect(event) {
        const files = event.target.files;
        const currentSubtitle = document.getElementById('currentSubtitleInput').value.trim();
        let targetGroup = structuredGroups.find(g => g.subtitle.toLowerCase() === currentSubtitle.toLowerCase());
        
        if (!targetGroup) {
            targetGroup = { subtitle: currentSubtitle, images: [] };
            structuredGroups.push(targetGroup);
        }

        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                targetGroup.images.push({ name: file.name, base64: e.target.result });
                renderPreviews();
            };
            reader.readAsDataURL(file);
        });
    }

    function updateQuickSelectBadges() {
        const container = document.getElementById('quickSelectContainer');
        const badgeList = document.getElementById('badgeList');
        badgeList.innerHTML = '';
        if (structuredGroups.length > 0) {
            container.style.display = 'block';
            structuredGroups.forEach(g => {
                const span = document.createElement('span');
                span.className = 'subtitle-badge';
                span.textContent = g.subtitle;
                span.onclick = () => document.getElementById('currentSubtitleInput').value = g.subtitle;
                badgeList.appendChild(span);
            });
        }
    }

    function renderPreviews() {
        const container = document.getElementById('photoPreviewContainer');
        container.innerHTML = '';
        document.getElementById('emptyState').style.display = structuredGroups.length ? 'none' : 'block';
        
        structuredGroups.forEach((group, gIdx) => {
            const box = document.createElement('div');
            box.className = 'photo-group-box';
            box.innerHTML = `<div style="font-weight:bold; margin-bottom:8px;">${group.subtitle}</div>`;
            const grid = document.createElement('div');
            grid.style.display = 'grid'; grid.style.gridTemplateColumns = 'repeat(4, 1fr)'; grid.style.gap = '5px';
            
            group.images.forEach((img, iIdx) => {
                grid.innerHTML += `<div style="position:relative;">
                    <img src="${img.base64}" style="width:100%; height:50px; object-fit:cover; border-radius:4px;">
                    <span onclick="removeImage(${gIdx}, ${iIdx})" style="position:absolute; top:0; right:0; cursor:pointer; color:red; font-size:10px;">[X]</span>
                </div>`;
            });
            box.appendChild(grid);
            container.appendChild(box);
        });
        updateQuickSelectBadges();
    }

    function removeImage(gIdx, iIdx) {
        structuredGroups[gIdx].images.splice(iIdx, 1);
        if (structuredGroups[gIdx].images.length === 0) structuredGroups.splice(gIdx, 1);
        renderPreviews();
    }

    async function simpanKeSupabase() {
        const data = {
            tanggal: new Date().toISOString().split('T')[0],
            name_kegiatan: document.getElementById('pdfTitle').value,
            alamat: document.getElementById('custAddress').value,
            teknisi: document.getElementById('techName').value
        };
        const { error } = await supabaseClient.from('laporan_instalasi').insert([data]);
        if (error) alert("Gagal simpan: " + error.message);
        else generatePDF();
    }

    function generatePDF() {
        const doc = new jsPDF();
        doc.text(document.getElementById('pdfTitle').value || "Laporan", 14, 20);
        let y = 30;
        structuredGroups.forEach(group => {
            doc.text(group.subtitle, 14, y); y += 10;
            group.images.forEach((img, i) => {
                if (y > 250) { doc.addPage(); y = 20; }
                const x = (i % 2 === 0) ? 14 : 110;
                doc.addImage(img.base64, 'JPEG', x, y, 80, 60);
                if (i % 2 !== 0) y += 70;
            });
            y += 70;
        });
        doc.save("Laporan_Instalasi.pdf");
    }
</script>
</body>
</html>
